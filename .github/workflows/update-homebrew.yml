# .github/workflows/update-homebrew.yml
name: Update Homebrew Formula
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [ main ]
    paths:
      - 'server/**'
      - 'Dockerfile'
      - 'docker-compose.prod.yml'
      - 'bin/smartqueue'
  workflow_dispatch:

jobs:
  update-formula:
    runs-on: ubuntu-latest
    if: github.repository == 'raseyanen/smartqueue'
    
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: smartqueue
          fetch-depth: 0
      
      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: raseyanen/homebrew-smartqueue
          path: homebrew-smartqueue
          token: ${{ secrets.HOMEBREW_TOKEN }}
      
      - name: Get version and SHA
        id: meta
        run: |
          cd smartqueue
          # Берем последний коммит как версию
          VERSION=$(git rev-parse --short HEAD)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
          # Скачиваем архив С ГИТХАБА (не локальный!)
          cd ..
          curl -L -o smartqueue.tar.gz "https://github.com/raseyanen/smartqueue/archive/$VERSION.tar.gz"
          
          # Считаем хеш скачанного архива
          SHA256=$(shasum -a 256 smartqueue.tar.gz | cut -d' ' -f1)
          echo "SHA256=$SHA256" >> $GITHUB_OUTPUT
          
          echo "Version: $VERSION"
          echo "SHA256: $SHA256"
      
      - name: Update formula
        run: |
          cd homebrew-smartqueue
          
          # Обновляем формулу
          cat > Formula/smartqueue.rb << 'EOF'
          # Maintainer: raseyanen
          class Smartqueue < Formula
            desc "Smart Queue Management System - Docker-based Django app"
            homepage "https://github.com/raseyanen/smartqueue"
            url "https://github.com/raseyanen/smartqueue/archive/VERSION_PLACEHOLDER.tar.gz"
            sha256 "SHA256_PLACEHOLDER"
            version "VERSION_PLACEHOLDER"
          
            depends_on "docker"
            depends_on "docker-compose"
          
            def install
              bin.install "bin/smartqueue"
              prefix.install "docker-compose.prod.yml"
              prefix.install ".env.example"
            end
          
            def caveats
              <<~EOS
                First time setup:
                  1. Edit your environment file:
                     nano #{opt_prefix}/.env.example
                  2. Then run:
                     smartqueue start
              EOS
            end
          end
          EOF
          
          # Подставляем переменные
          sed -i "s/VERSION_PLACEHOLDER/${{ steps.meta.outputs.VERSION }}/g" Formula/smartqueue.rb
          sed -i "s/SHA256_PLACEHOLDER/${{ steps.meta.outputs.SHA256 }}/g" Formula/smartqueue.rb
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Formula/smartqueue.rb
          git commit -m "Update formula to version ${{ steps.meta.outputs.VERSION }}" || echo "No changes"
          git push
