{% extends 'base.html' %}

{% block title %}Создать очередь - Smart Queue{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-plus-lg"></i> Создать новую очередь</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name" class="form-label">Название очереди <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Например: Электронная регистратура" required>
                        <div class="form-text">Введите название вашей очереди</div>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Описание</label>
                        <textarea class="form-control" id="description" name="description" rows="4" placeholder="Краткое описание очереди (необязательно)"></textarea>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-lg"></i> Создать очередь
                        </button>
                        <a href="{% url 'queues:queue_list' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Назад к списку
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
