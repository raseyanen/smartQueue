{% extends 'base.html' %}

{% block title %}Проверка талона{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Проверка талона по хешу</h4>
                </div>
                <div class="card-body">
                    <form method="get" action="{% url 'queues:verify_ticket_result' %}">
                        <div class="mb-3">
                            <label for="ticket_hash" class="form-label">Введите хеш талона</label>
                            <input type="text" class="form-control" id="ticket_hash" name="hash" 
                                   placeholder="Введите хеш из чека или отсканируйте QR-код" required>
                            <div class="form-text">Хеш можно найти на чеке или отсканировать QR-код камерой телефона</div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Проверить талон</button>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <p class="text-muted">Или отсканируйте QR-код с чека</p>
                        <i class="bi bi-qr-code-scan" style="font-size: 3rem; color: #6c757d;"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
