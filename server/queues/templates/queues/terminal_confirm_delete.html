{% extends 'base.html' %}

{% block title %}Удаление терминала{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h4>Удаление терминала</h4>
                </div>
                <div class="card-body">
                    <p>Вы уверены, что хотите удалить терминал <strong>"{{ terminal.name }}"</strong>?</p>
                    <p class="text-muted">Это действие нельзя отменить.</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Удалить</button>
                        <a href="{% url 'queues:terminal_detail' pk=terminal.pk %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
