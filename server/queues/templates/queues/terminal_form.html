{% extends 'base.html' %}

{% block title %}Редактирование терминала{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4>Редактирование терминала "{{ terminal.name }}"</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="name" class="form-label">Название терминала</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ terminal.name }}" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if terminal.is_active %}checked{% endif %}>
                            <label class="form-check-label" for="is_active">Активен</label>
                        </div>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                        <a href="{% url 'queues:terminal_detail' pk=terminal.pk %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
