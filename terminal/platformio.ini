; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; Библиотеки GyverLibs и другие
lib_deps = 
    GyverLibs/Settings@^1.0.0
    AlexGyver/GyverPortal@^1.0.0
    GyverLibs/FileData@^1.0.0
    GyverLibs/GyverNTP@^1.0.0
    GyverLibs/GyverOLED@^2.0.0
    GyverLibs/GyverButton@^7.0.0
    GyverLibs/GSON@^1.0.0
    GyverLibs/mString@^1.0.0
    GyverLibs/GyverUART@^1.0.0
    knolleary/PubSubClient@^2.8.0
    lorol/LittleFS_esp32@^1.0.6
    bblanchon/ArduinoJson@^7.0.0
    adafruit/Adafruit Thermal Printer@^1.2.0

build_flags = 
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM

board_build.filesystem = littlefs

; OTA обновление
upload_protocol = espota
upload_port = terminal.local

; Режим AP для настройки
