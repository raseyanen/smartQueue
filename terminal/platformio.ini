; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; Библиотеки GyverLibs и другие
lib_deps = 
    https://github.com/GyverLibs/Settings.git
    https://github.com/GyverLibs/GyverPortal.git
    https://github.com/GyverLibs/FileData.git
    https://github.com/GyverLibs/GyverNTP.git
    https://github.com/GyverLibs/GyverOLED.git
    https://github.com/GyverLibs/GyverButton.git
    https://github.com/GyverLibs/GSON.git
    https://github.com/GyverLibs/mString.git
    https://github.com/GyverLibs/GyverUART.git
    knolleary/PubSubClient@^2.8.0
    lorol/LittleFS_esp32@^1.0.6
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/adafruit/Adafruit-Thermal-Printer-Library.git

build_flags = 
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM

board_build.filesystem = littlefs

; OTA обновление
upload_protocol = espota
upload_port = terminal.local

; Режим AP для настройки
; При первой прошивке устройство создаст точку доступа "SmartQueue-XXXX"

