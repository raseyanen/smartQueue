; =============================================================================
;  SmartQueue Terminal v2  —  platformio.ini
;
;  Платы:
;    esp32_wroom        — ESP32-WROOM-32 / DevKit  (Bluetooth Classic SPP)
;    esp32c3_supermini  — ESP32-C3 SuperMini        (BLE NUS, без Classic BT)
;
;  Сборка:
;    pio run -e esp32_wroom -t upload
;    pio run -e esp32c3_supermini -t upload
;
;  Загрузка файловой системы (LittleFS):
;    pio run -e esp32_wroom -t uploadfs
;
;  Мониторинг:
;    pio device monitor
; =============================================================================

[platformio]
default_envs = esp32_wroom

; -----------------------------------------------------------------------------
;  Общие настройки — наследуются всеми окружениями
; -----------------------------------------------------------------------------
[env]
framework     = arduino
monitor_speed = 115200

; LittleFS как файловая система (нужна для GyverDB + OTA файлов)
board_build.filesystem = littlefs

; Версия платформы — фиксируем для воспроизводимых сборок
; Если нужна другая — замените или уберите строку (возьмётся последняя)
platform = espressif32 @ ^6.9.0

; Зависимости, общие для всех платформ
lib_deps =
    gyverlibs/Settings          ; Веб-интерфейс настроек
    gyverlibs/GyverDB           ; База данных (в памяти)
    gyverlibs/FileData          ; GyverDBFile — автосохранение в LittleFS
    gyverlibs/GyverHTTP         ; HTTP-клиент (лёгкий, без зависимостей)
    gyverlibs/StringUtils       ; Зависимость Settings
    gyverlibs/GTL               ; Зависимость Settings
    gyverlibs/BSON              ; Зависимость Settings
    gyverlibs/Stamp             ; Зависимость Settings
    gyverlibs/StreamIO          ; Зависимость Settings
    h2zero/NimBLE-Arduino       ; <-- WROOM тоже через NimBLE!

; Фильтры монитора — декодирование стек-трейсов + стандартный вывод
monitor_filters =
    esp32_exception_decoder
    default

; Размер партиции — убедитесь что таблица партиций соответствует
; (default_4MB_with_spiffs → используйте default или custom)
board_build.partitions = default.csv

; -----------------------------------------------------------------------------
;  ESP32-WROOM-32 / ESP32-DevKitC
;  Bluetooth Classic SPP — полная совместимость с FunnyPrint LX-D02
; -----------------------------------------------------------------------------
[env:esp32_wroom]
board        = esp32dev
upload_speed = 921600

build_flags =
    ${env.build_flags}
; Идентификатор платы для условной компиляции в main.cpp
    -D BOARD_WROOM
; Включаем Classic Bluetooth (Bluedroid стек)
    -D CONFIG_BT_ENABLED=1
    -D CONFIG_BLUEDROID_ENABLED=1
    -D CONFIG_BT_SPP_ENABLED=1
; Уровень логов ESP-IDF (1=Error, 2=Warn, 3=Info, 4=Debug, 5=Verbose)
    -D CORE_DEBUG_LEVEL=3
; Оптимизация: скорость (можно заменить на -Os для размера)
    -O2

; Таблица партиций с местом под OTA + LittleFS
; Для WROOM с 4 МБ флеша подходит стандартная схема:
;   app0: 1.5 МБ | app1: 1.5 МБ (OTA) | data: 512 КБ (LittleFS)
board_build.partitions = min_spiffs.csv

; -----------------------------------------------------------------------------
;  ESP32-C3 SuperMini
;  ТОЛЬКО BLE 5.0 (NimBLE).  Classic Bluetooth на C3 аппаратно отсутствует.
;  Принтер должен поддерживать BLE NUS (Nordic UART Service).
; -----------------------------------------------------------------------------
[env:esp32c3_supermini]
board        = esp32-c3-devkitm-1
upload_speed = 460800

; C3 использует USB-CDC для Serial — обязательные флаги
build_flags =
    ${env.build_flags}
    -D BOARD_C3
; USB-CDC Serial (встроенный USB без доп. чипа)
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
; NimBLE вместо Bluedroid — меньше RAM, поддерживается на C3
    -D CONFIG_BT_NIMBLE_ENABLED=1
; Убираем Classic BT (его нет, но явно отключаем чтоб не было варнингов)
    -D CONFIG_BT_CLASSIC_ENABLED=0
    -D CORE_DEBUG_LEVEL=3
    -O2

board_build.mcu   = esp32c3
board_build.f_cpu = 160000000L
; C3 SuperMini — 4 МБ флеша, та же схема партиций
board_build.partitions = min_spiffs.csv

; NimBLE — лёгкий BLE-стек специально для C3/S3
lib_deps =
    ${env.lib_deps}
    h2zero/NimBLE-Arduino @ ^2.1.0

; -----------------------------------------------------------------------------
;  Расширенная отладка (опционально, раскомментируйте при проблемах)
; -----------------------------------------------------------------------------
; [env:esp32_wroom_debug]
; extends        = esp32_wroom
; build_type     = debug
; build_flags    =
;     ${esp32_wroom.build_flags}
;     -D CORE_DEBUG_LEVEL=5
;     -D CONFIG_ARDUHAL_LOG_COLORS=1
; debug_tool     = esp-prog
; debug_init_break = tbreak setup