version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: smartqueue
      POSTGRES_USER: smartqueue
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartqueue"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: moodroow/smartqueue:latest
    command: gunicorn smartqueue.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://smartqueue:${DB_PASSWORD}@db:5432/smartqueue
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}

volumes:
  postgres_data:
